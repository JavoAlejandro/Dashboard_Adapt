  tasks:
    status: done
  apply:
    status: in_progress — PR1 applied; PR2 applied+reworked and committed (253d21d, b3211e8) on feature/congestion-panel-pr3-empresa (built on top of pr2-camion); PR3 (Phase 4, company congestion KPIs) applied and reworked TWICE in-branch — built once as an Empresa Congestión sub-tab (reverted), then as a Global-sub-tab velocímetro grid (also reverted), then as a Global-sub-tab stat/bar/rank card system reusing Camión's own _congRenderKpis, per two rounds of user feedback (2026-07-22); code + docs reconciled, ready to commit, not yet reviewed/pushed
  verify:
    status: pending
  archive:
    status: pending
